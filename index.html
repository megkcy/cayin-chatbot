<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAYIN Technology 鎧應科技</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Demo page background -->
  <div class="demo-page">
    <img src="https://www.cayintech.com/images/Logo.svg" alt="CAYIN Technology 鎧應科技" class="demo-logo">
    <p class="demo-hint">Click the chat button →</p>
  </div>

  <!-- ── Chat popup ── -->
  <div id="chat-popup" class="chat-popup hidden">

    <!-- Popup header -->
    <div class="popup-header">
      <div class="popup-header-left">
        <div class="popup-avatar">
          <img src="https://www.cayintech.com/images/Logo.svg" alt="CAYIN" class="popup-avatar-img">
        </div>
        <div>
          <div class="popup-name">CAYIN Technology 鎧應科技</div>
          <div class="popup-status"><span class="online-dot"></span>Online</div>
        </div>
      </div>
      <button id="close-btn" class="close-btn" title="Close">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>

    <!-- Lead form (shown first) -->
    <div id="lead-pane" class="pane">
      <div class="lead-intro">
        <p>👋 Hi there! Before we start, please tell us who you are.</p>
      </div>
      <form id="lead-form" class="lead-form">
        <div class="field">
          <label for="visitor-name">Name</label>
          <input id="visitor-name" type="text" placeholder="Your name" required autocomplete="name" />
        </div>
        <div class="field">
          <label for="visitor-email">Email</label>
          <input id="visitor-email" type="email" placeholder="you@company.com" required autocomplete="email" />
        </div>
        <button type="submit" class="start-btn">
          Start Chat
          <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </form>
    </div>

    <!-- Chat pane -->
    <div id="chat-pane" class="pane hidden">
      <div class="messages" id="chat-messages"></div>
      <div class="disclaimer">
        Automated chatbot response. &nbsp;<a href="https://www.cayintech.com/contactus" target="_blank" rel="noopener">Contact us</a>
      </div>
      <div class="input-bar">
        <input id="chat-input" type="text" placeholder="Ask me anything…" autocomplete="off" />
        <button id="send-btn" class="send-btn" title="Send">
          <svg viewBox="0 0 24 24" fill="currentColor" width="17" height="17">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <!-- ── Floating bubble ── -->
  <button id="chat-bubble" class="chat-bubble" title="Chat with us">
    <span id="bubble-icon-open">
      <svg viewBox="0 0 24 24" fill="currentColor" width="26" height="26">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
      </svg>
    </span>
    <span id="bubble-icon-close" class="hidden">
      <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </span>
    <span id="unread-badge" class="unread-badge hidden">1</span>
  </button>

  <script src="app.js"></script>
</body>
</html>
